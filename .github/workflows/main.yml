name: long-short

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pandas feedparser vaderSentiment

      - name: Run bot
        env:
          WUNDER_WEBHOOK_URL: ${{ secrets.WUNDER_WEBHOOK_URL }}
          WUNDER_LONG_CODE: ${{ secrets.WUNDER_LONG_CODE }}
          WUNDER_SHORT_CODE: ${{ secrets.WUNDER_SHORT_CODE }}
          WUNDER_EXIT_CODE: ${{ secrets.WUNDER_EXIT_CODE }}
          BUD_DRY_RUN: "false"  # <-- Αυτό είναι το κρίσιμο!
          BUD_AMOUNT_PER_TRADE: "0.1"
          BUD_LEVERAGE: "2"
        run: python main.py
